<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>设置</title><link rel="stylesheet" href="settings.css"></head><body><main id="settings"><button id="settings-close" type="button" aria-label="关闭">×</button><button class="row" id="mouse-follow">视线跟随鼠标<i></i></button><button class="row" id="click-through">鼠标穿透<i></i></button><button class="row" id="always-on-top">保持置顶<i></i></button><label id="volume">音量 <input id="volume-input" type="range" min="0" max="100"><output id="volume-value"></output></label><section id="llm"><label>API 地址<input id="url"></label><label>模型<input id="model"></label><label>API Key<input id="key" type="password"></label><small id="api-state"></small><div><button id="save">保存 API</button><button id="clear-context">清空上下文</button></div></section><div id="history-actions"><button class="row" id="history">查看记录 <b>›</b></button><button class="row" id="clear-history">清空记录</button></div></main><script src="settings.js"></script></body></html>
